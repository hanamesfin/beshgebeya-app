{% extends "base.html" %}

{% block title %}Set New Password - BeshGebeya{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="BeshGebeya Logo" class="auth-logo-img">
        </div>
        <h2 data-en="Create New Password" data-am="አዲስ የይለፍ ቃል ይፍጠሩ">Create New Password</h2>

        <form method="POST">
            <div class="form-group">
                <label for="password" data-en="New Password" data-am="አዲስ የይለፍ ቃል">New Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required minlength="6">
                    <span class="password-toggle" onclick="togglePasswordVisibility('password')">
                        <svg id="eye-icon-password" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="glass-btn-blue w-100 mt-3 btn-auth" data-en="Update Password"
                data-am="የይለፍ ቃል አድስ">
                Update Password
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function togglePasswordVisibility(fieldId) {
        const input = document.getElementById(fieldId);
        const icon = document.getElementById('eye-icon-' + fieldId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        } else {
            input.type = 'password';
            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }
    }
</script>
{% endblock %}
