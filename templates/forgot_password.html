{% extends "base.html" %}

{% block title %}Forgot Password - BeshGebeya{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-logo">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="BeshGebeya Logo" class="auth-logo-img">
        </div>
        <h2 data-en="Reset Your Password" data-am="የይለፍ ቃልዎን ይቀይሩ">Reset Your Password</h2>
        <p class="auth-description">
            Enter your email address and we'll send you a link to reset your password.
        </p>

        <form method="POST">
            <div class="form-group">
                <label for="email" data-en="Email Address" data-am="ኢሜይል አድራሻ">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="email@example.com">
            </div>

            <button type="submit" class="glass-btn-blue w-100 mt-3 btn-auth" data-en="Send Reset Link"
                data-am="የመቀየሪያ ሊንክ ላክ">
                Send Reset Link
            </button>
        </form>

        <p class="auth-link">
            Remembered your password? <a href="{{ url_for('login') }}">Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
